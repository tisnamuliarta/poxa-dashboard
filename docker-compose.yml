version: "3.8"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poxa-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - POXA_HOST=sso.imip.co.id
      - POXA_PORT=443
      - POXA_SCHEME=https
      - POXA_APP_ID=321434
      - POXA_APP_KEY=027160175a01cb58f9179878f62a952d
      - POXA_SECRET=bf80961e5ea45d67148ceabedebdc78f
      - DATABASE_URL=file:./prisma/prod.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@poxa.local
      - ADMIN_PASSWORD=admin123
    restart: unless-stopped
    volumes:
      - ./prisma:/app/prisma

  # Optional: Development version with hot reload
  # Uncomment to use for development
  # dashboard-dev:
